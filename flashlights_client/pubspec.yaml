name: flashlights_client
description: Remote torch/audio client for Flashlights-in-the-Dark
publish_to: 'none'
version: 1.0.5+13

environment:
  # Works with Flutter 3.19 + and Dart 3.7 +
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- runtime plugins ---
  cupertino_icons: ^1.0.8
  torch_light: ^1.1.0  # Flash/torch control (on/off only – no brightness)
  screen_brightness: ^2.1.5 # Control screen brightness for strobe dimming
  audio_session: ^0.1.25 # Ensure playback works in silent mode on iOS/Android
  # Native audio playback is handled through platform method channels.
  wakelock_plus: ^1.2.5     # Keep the screen awake during performances
  shared_preferences: ^2.5.3  # Persist selected slot between launches

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0   # latest lint set for Dart 3

flutter:
  uses-material-design: true
  assets:
    - assets/event_recipes.json
    - assets/show_profiles.json
    - available-sounds/sound-events-LEFT/
    - available-sounds/sound-events-CENTER/
    - available-sounds/sound-events-RIGHT/
    - available-sounds/electronics-trigger-clips/soprano/
    - available-sounds/electronics-trigger-clips/alto/
    - available-sounds/electronics-trigger-clips/tenor-bass/
    - available-sounds/electronics-trigger-clips/part-specific/alto-l1/
    - available-sounds/electronics-trigger-clips/part-specific/alto-l2/
    - available-sounds/electronics-trigger-clips/part-specific/bass-l/
    - available-sounds/electronics-trigger-clips/part-specific/soprano-l1/
    - available-sounds/electronics-trigger-clips/part-specific/soprano-l2/
    - available-sounds/electronics-trigger-clips/part-specific/tenor-l/

dependency_overrides:
  win32: ^5.14.0

flutter_icons:
  android: true
  ios: false
  image_path: FlashlightsInTheDark_Icons/FlashlightsInTheDark-Icon-1024.png
